{% extends "base.html" %}
{% block content %}
<section class="login-wrap">
    <div class="login-panel">
        <div class="page-header">
            <h2 class="page-title">Login</h2>
            <p class="page-subtitle">Use your bracket username and password.</p>
        </div>
        <form method="POST" class="login-form surface-soft">
            <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <input type="text" class="form-control" id="username" name="username" autocomplete="username" required>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" name="password" autocomplete="current-password" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Login</button>
        </form>
    </div>
</section>

<style>
    .login-wrap {
        max-width: 500px;
        margin: 0 auto;
    }

    .login-panel {
        border: 1px solid #e1ccb0;
        border-radius: 1rem;
        padding: 0.8rem;
        background:
            radial-gradient(20rem 10rem at 100% 0, rgba(239, 107, 46, 0.12), transparent 55%),
            #fffdf9;
        box-shadow: 0 12px 24px rgba(20, 31, 47, 0.11);
    }

    .login-form {
        padding: 1rem 1rem 0.92rem;
    }

    @media (min-width: 768px) {
        .login-panel {
            padding: 1rem;
        }

        .login-form {
            padding: 1.25rem;
        }
    }
</style>
{% endblock %}
