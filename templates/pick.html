{% extends "base.html" %}
{% block content %}
<div class="page-header">
    <h2 class="page-title">Make Picks</h2>
    <p class="page-subtitle">{{ current_round.name }}</p>
</div>

<form method="POST" id="pickForm">
    {% if current_round.name == 'Championship' %}
    <div class="mb-3 wager-card surface-soft">
        <label for="wagerInput" class="form-label mb-1">Wager (Max: {{ user_points }} points)</label>
        <input type="number" class="form-control" id="wagerInput" name="wager" min="0" max="{{ user_points }}" value="{{ wager }}">
    </div>
    {% endif %}

    <div id="pickError" class="alert alert-danger d-none" role="alert">
        Please select a team for this game.
    </div>
    <div class="table-responsive">
        <table class="table table-striped table-sm align-middle mb-0 picks-table">
            <thead class="table-dark">
                <tr>
                    <th>Team 1</th>
                    <th>Team 2</th>
                </tr>
            </thead>
            <tbody>
                {% for game in games %}
                {% set existing_pick = existing_picks.get(game.id) %}
                <tr id="game-row-{{ game.id }}">
                    <td class="pick-cell" data-radio-id="game{{ game.id }}_team1">
                        <div class="form-check">
                            <input type="radio" class="form-check-input" name="game{{ game.id }}" value="{{ game.team1 }}"
                                id="game{{ game.id }}_team1"
                                {% if existing_pick and existing_pick.picked_team == game.team1 %}checked{% endif %}>
                            <label class="form-check-label" for="game{{ game.id }}_team1">{{ game.team1 }}</label>
                        </div>
                    </td>
                    <td class="pick-cell" data-radio-id="game{{ game.id }}_team2">
                        <div class="form-check">
                            <input type="radio" class="form-check-input" name="game{{ game.id }}" value="{{ game.team2 }}"
                                id="game{{ game.id }}_team2"
                                {% if existing_pick and existing_pick.picked_team == game.team2 %}checked{% endif %}>
                            <label class="form-check-label" for="game{{ game.id }}_team2">{{ game.team2 }}</label>
                        </div>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
    <div class="action-row">
        <button type="submit" class="btn btn-primary submit-btn">Submit Picks</button>
    </div>
</form>

<script>
    {% if error_game_id %}
        document.getElementById('pickError').classList.remove('d-none');
        document.getElementById('game-row-{{ error_game_id }}').classList.add('table-danger');
        document.getElementById('game-row-{{ error_game_id }}').scrollIntoView({ behavior: 'smooth', block: 'center' });
    {% endif %}

    document.querySelectorAll('.pick-cell').forEach(function(cell) {
        cell.addEventListener('click', function(event) {
            if (event.target.closest('input, label, select, option, button, a')) {
                return;
            }
            const radioId = cell.getAttribute('data-radio-id');
            const radio = radioId ? document.getElementById(radioId) : null;
            if (radio) {
                radio.checked = true;
            }
        });
    });

    document.getElementById('pickForm').addEventListener('submit', function(event) {
        document.getElementById('pickError').classList.add('d-none');
        document.querySelectorAll('tr[id^="game-row-"]').forEach(function(row) {
            row.classList.remove('table-danger');
        });

        let firstEmptyGameId = null;
        {% for game in games %}
            const pick_{{ game.id }} = document.querySelector('input[name="game{{ game.id }}"]:checked');
            if (!pick_{{ game.id }}) {
                if (!firstEmptyGameId) {
                    firstEmptyGameId = {{ game.id }};
                }
            }
        {% endfor %}

        if (firstEmptyGameId) {
            event.preventDefault();
            document.getElementById('pickError').classList.remove('d-none');
            const firstRow = document.getElementById('game-row-' + firstEmptyGameId);
            firstRow.classList.add('table-danger');
            firstRow.scrollIntoView({ behavior: 'smooth', block: 'center' });
            return false;
        }
    });
</script>

<style>
    .wager-card {
        max-width: 360px;
        padding: 0.85rem;
    }

    .picks-table th {
        text-transform: uppercase;
        font-size: 0.78rem;
        letter-spacing: 0.06em;
    }

    .pick-cell {
        cursor: pointer;
        transition: background-color 0.18s ease;
    }

    .pick-cell:hover {
        background-color: rgba(10, 77, 104, 0.08);
    }

    .pick-cell .form-check-label {
        width: 100%;
        font-weight: 700;
        color: #173551;
    }

    .submit-btn {
        width: 100%;
    }

    @media (min-width: 768px) {
        .submit-btn {
            width: auto;
        }
    }
</style>
{% endblock %}
